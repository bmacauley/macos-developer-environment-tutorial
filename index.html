<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Toolsmith's Course</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
<style>
  :root {
    --bg: #0f1420;
    --panel: #161d2e;
    --panel-2: #1d2740;
    --text: #e6ebf5;
    --muted: #9aa7c2;
    --accent: #5e8bff;
    --accent-2: #7ee0c0;
    --border: #26314d;
    --done: #7ee0c0;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 16px/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    min-height: 100vh;
  }
  a { color: var(--accent); }
  /* Sidebar */
  aside {
    width: 300px;
    flex: 0 0 300px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    padding: 22px 16px 40px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  .brand { font-size: 20px; font-weight: 700; letter-spacing: .2px; }
  .brand span { color: var(--accent-2); }
  .tagline { color: var(--muted); font-size: 13px; margin: 6px 0 18px; }
  .progress-wrap { background: var(--panel-2); border-radius: 8px; height: 8px; overflow: hidden; margin-bottom: 6px; }
  .progress-bar { height: 100%; width: 0; background: linear-gradient(90deg, var(--accent), var(--accent-2)); transition: width .3s; }
  .progress-label { color: var(--muted); font-size: 12px; margin-bottom: 18px; }
  nav a {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 10px; border-radius: 8px;
    color: var(--text); text-decoration: none; font-size: 14px;
    margin-bottom: 2px;
  }
  nav a:hover { background: var(--panel-2); }
  nav a.active { background: var(--panel-2); box-shadow: inset 3px 0 0 var(--accent); }
  nav a .dot {
    width: 16px; height: 16px; flex: 0 0 16px; border-radius: 50%;
    border: 2px solid var(--border); display: inline-block;
  }
  nav a.done .dot { background: var(--done); border-color: var(--done); }
  nav a .mins { margin-left: auto; color: var(--muted); font-size: 11px; }
  .reset { margin-top: 20px; font-size: 12px; color: var(--muted); background: none; border: none; cursor: pointer; text-decoration: underline; padding: 0; }
  /* Main */
  main { flex: 1; min-width: 0; padding: 44px 6vw 120px; max-width: 900px; }
  .content h1 { font-size: 30px; line-height: 1.2; margin-top: 0; }
  .content h2 { font-size: 23px; margin-top: 2.2em; border-bottom: 1px solid var(--border); padding-bottom: .3em; }
  .content h3 { font-size: 18px; margin-top: 1.8em; color: var(--accent-2); }
  .content code { background: var(--panel-2); padding: .15em .4em; border-radius: 5px; font-size: 90%; }
  .content pre { background: #0b1020; border: 1px solid var(--border); border-radius: 10px; padding: 16px; overflow-x: auto; }
  .content pre code { background: none; padding: 0; }
  .content blockquote { border-left: 4px solid var(--accent); margin: 1.2em 0; padding: .4em 1em; background: var(--panel); border-radius: 0 8px 8px 0; color: var(--text); }
  .content table { border-collapse: collapse; width: 100%; margin: 1em 0; }
  .content th, .content td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
  .content th { background: var(--panel-2); }
  .content kbd { background: var(--panel-2); border: 1px solid var(--border); border-bottom-width: 2px; border-radius: 5px; padding: 1px 6px; font-size: 85%; }
  .content hr { border: none; border-top: 1px solid var(--border); margin: 2.5em 0; }
  .footer-nav { display: flex; justify-content: space-between; gap: 12px; margin-top: 60px; }
  .footer-nav a, .mark-done {
    display: inline-block; padding: 10px 16px; border-radius: 10px; text-decoration: none;
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border); font-size: 14px; cursor: pointer;
  }
  .mark-done { background: linear-gradient(90deg, var(--accent), var(--accent-2)); color: #06121a; font-weight: 600; border: none; }
  .mark-done.is-done { background: var(--panel-2); color: var(--muted); font-weight: 400; }
  .center-done { text-align: center; margin-top: 40px; }
  .menu-btn { display: none; }
  @media (max-width: 820px) {
    body { flex-direction: column; }
    aside { position: fixed; left: -320px; transition: left .25s; z-index: 20; box-shadow: 0 0 40px rgba(0,0,0,.5); }
    aside.open { left: 0; }
    main { padding: 70px 22px 120px; }
    .menu-btn { display: block; position: fixed; top: 12px; left: 12px; z-index: 30; background: var(--panel-2); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 18px; cursor: pointer; }
  }
</style>
</head>
<body>
  <button class="menu-btn" onclick="document.querySelector('aside').classList.toggle('open')">☰</button>
  <aside>
    <div class="brand">The <span>Toolsmith's</span> Course</div>
    <div class="tagline" id="tagline"></div>
    <div class="progress-wrap"><div class="progress-bar" id="bar"></div></div>
    <div class="progress-label" id="plabel">0% complete</div>
    <nav id="nav"></nav>
    <button class="reset" onclick="resetProgress()">Reset progress</button>
  </aside>
  <main>
    <div class="content" id="content">Loading…</div>
    <div class="footer-nav" id="footernav"></div>
  </main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
const STORE_KEY = "toolsmith-progress-v1";
let manifest = { lessons: [] };
let current = 0;

function loadDone() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
  catch (e) { return {}; }
}
function saveDone(d) { localStorage.setItem(STORE_KEY, JSON.stringify(d)); }

async function init() {
  const res = await fetch("lessons.json");
  manifest = await res.json();
  document.getElementById("tagline").textContent = manifest.subtitle || "";
  buildNav();
  const idx = indexFromHash();
  showLesson(idx);
}

function indexFromHash() {
  const h = decodeURIComponent(location.hash.replace(/^#/, ""));
  const i = manifest.lessons.findIndex(l => l.file === h);
  return i >= 0 ? i : 0;
}

function buildNav() {
  const done = loadDone();
  const nav = document.getElementById("nav");
  nav.innerHTML = "";
  manifest.lessons.forEach((l, i) => {
    const a = document.createElement("a");
    a.href = "#" + l.file;
    a.dataset.i = i;
    a.className = (i === current ? "active " : "") + (done[l.file] ? "done" : "");
    a.innerHTML = `<span class="dot"></span><span>${l.title}</span><span class="mins">${l.minutes}m</span>`;
    a.onclick = (e) => { e.preventDefault(); location.hash = l.file; showLesson(i); document.querySelector('aside').classList.remove('open'); };
    nav.appendChild(a);
  });
  updateProgress();
}

function updateProgress() {
  const done = loadDone();
  const total = manifest.lessons.length;
  const n = manifest.lessons.filter(l => done[l.file]).length;
  const pct = total ? Math.round((n / total) * 100) : 0;
  document.getElementById("bar").style.width = pct + "%";
  document.getElementById("plabel").textContent = `${pct}% complete · ${n}/${total} lessons`;
}

async function showLesson(i) {
  current = i;
  const lesson = manifest.lessons[i];
  const content = document.getElementById("content");
  content.innerHTML = "Loading…";
  window.scrollTo(0, 0);
  let md = "";
  try {
    const r = await fetch("lessons/" + lesson.file);
    md = await r.text();
  } catch (e) {
    content.innerHTML = "<p>Could not load this lesson.</p>";
    return;
  }
  content.innerHTML = marked.parse(md);
  content.querySelectorAll("pre code").forEach(b => hljs.highlightElement(b));
  document.querySelectorAll("#nav a").forEach(a => {
    a.classList.toggle("active", +a.dataset.i === i);
  });
  buildFooter(i);
}

function buildFooter(i) {
  const done = loadDone();
  const lesson = manifest.lessons[i];
  const isDone = !!done[lesson.file];
  const foot = document.getElementById("footernav");
  const prev = i > 0 ? `<a href="#${manifest.lessons[i-1].file}" onclick="jump(${i-1});return false;">← ${manifest.lessons[i-1].title}</a>` : "<span></span>";
  const next = i < manifest.lessons.length - 1 ? `<a href="#${manifest.lessons[i+1].file}" onclick="jump(${i+1});return false;">${manifest.lessons[i+1].title} →</a>` : "<span></span>";
  foot.innerHTML = `
    <div class="center-done" style="width:100%">
      <button class="mark-done ${isDone ? 'is-done' : ''}" onclick="toggleDone()">${isDone ? '✓ Completed — click to unmark' : 'Mark this lesson complete'}</button>
    </div>
    <div style="display:flex;justify-content:space-between;width:100%;gap:12px;margin-top:16px">${prev}${next}</div>`;
}

function jump(i) { location.hash = manifest.lessons[i].file; showLesson(i); }

function toggleDone() {
  const done = loadDone();
  const f = manifest.lessons[current].file;
  done[f] = !done[f];
  saveDone(done);
  buildNav();
  buildFooter(current);
}

function resetProgress() {
  if (confirm("Reset all lesson progress?")) { saveDone({}); buildNav(); buildFooter(current); }
}

window.addEventListener("hashchange", () => showLesson(indexFromHash()));
init();
</script>
</body>
</html>
